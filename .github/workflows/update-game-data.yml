name: Update Game Data

on:
  schedule:
    - cron: '0 6 * * 0'  # Weekly, Sunday 6am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Check for new game version
        run: python extract_game_data.py --check

      - name: Commit and push
        run: |
          git config user.name "Price Bot"
          git config user.email "bot@github.com"
          git add game-data.js
          git diff --cached --quiet || (git commit -m "game data $(python -c "import json;d=json.loads(open('game-data.js').read()[27:-1]);print(d['version'])")" && git push)
